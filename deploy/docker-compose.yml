version: '3.8'

services:
  terriyaki-db:
    image: postgres:15
    container_name: terriyaki-db
    restart: always
    env_file:
      - ../.env
    volumes:
      - terriyaki-data:/var/lib/postgresql/data

  terriyaki-go:
    build: ../.
    container_name: terriyaki-go
    restart: always
    command: ["/terriyaki_backend"]
    volumes:
      - ../.:/src
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=terriyaki-db
    depends_on:
      - terriyaki-db
    logging:
        driver: "json-file"
        options:
            max-size: "50m"

  terriyaki-nginx:
      image: nginx:latest
      container_name: terriyaki-nginx
      restart: unless-stopped
      volumes:
          - ./nginx.conf:/etc/nginx/nginx.conf
          - /etc/letsencrypt/live/terriyaki.space/fullchain.pem:/etc/nginx/ssl/fullchain.pem
          - /etc/letsencrypt/live/terriyaki.space/privkey.pem:/etc/nginx/ssl/privkey.pem
      ports:
          - "9090:9090"
      depends_on:
          - terriyaki-go

volumes:
  terriyaki-data: